<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockSync – Login</title>
  <link rel="stylesheet" href="styles.css?v=20260521-backend-db">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 18px;
      overflow-y: auto;
    }

    .login-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 20%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
    }

    .login-wrap {
      position: relative;
      width: 360px;
      max-width: calc(100vw - 32px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 26px 28px;
      box-shadow: var(--shadow-lg);
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .login-brand-logo {
      width: 238px;
      max-width: 100%;
      margin-bottom: 0;
    }

    .login-title {
      font-size: 20px;
      font-weight: 700;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text3);
      margin-top: 0;
    }

    .forgot {
      font-size: 12px;
      color: var(--accent2);
      cursor: pointer;
      text-align: right;
      display: block;
      margin-top: -8px;
      margin-bottom: 12px;
    }

    .login-footer {
      text-align: center;
      font-size: 13px;
      color: var(--text3);
      margin-top: 14px;
    }

    .login-footer a {
      color: var(--accent2);
      cursor: pointer;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
    }

    .pass-wrap {
      position: relative;
    }

    .code-helper {
      margin-top: -10px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--accent2);
      cursor: pointer;
      display: inline-flex;
      background: none;
      border: none;
      font-family: var(--font);
      padding: 0;
    }

    .company-code-panel {
      display: none;
      margin-top: -8px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface2);
    }

    .company-code-panel.open { display: block; }

    .company-code-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12.5px;
    }

    .company-code-item:last-child { border-bottom: none; }

    .company-code-name { color: var(--text2); }

    .company-code-value {
      color: var(--text);
      font-family: var(--mono);
      font-weight: 700;
      cursor: pointer;
    }

    .login-wrap .form-group {
      margin-bottom: 14px;
    }

    .login-wrap .form-input {
      padding-top: 9px;
      padding-bottom: 9px;
    }
  </style>
</head>

<body>
  <div class="login-bg"></div>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="brand-logo-frame login-brand-logo">
        <img src="assets/logo-stocksync-login.png" alt="StockSync - Controle, organize e sincronize">
      </div>
      <div style="text-align:center">
        <div class="login-sub">Faça login para continuar</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Código da Empresa</label>
      <input class="form-input" type="text" placeholder="Ex: tcnk">
    </div>
    <button class="code-helper" id="mostrarCodigos" type="button">Não lembro o código</button>
    <div class="company-code-panel" id="painelCodigos"></div>

    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" placeholder="seu@email.com">
    </div>

    <div class="form-group">
      <label class="form-label">Senha</label>
      <div class="pass-wrap">
        <input id="senhaInput" class="form-input" type="password" style="padding-right:40px"> <button type="button"
          class="eye-btn" onclick="toggleSenha()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </div>

    <a class="forgot" id="forgotLink">Esqueceu a senha?</a>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px 12px">Entrar</button>

    <div class="login-footer">
      Não tem conta?
      <a onclick="window.location.href='02-cadastro-funcionario.html?novo=funcionario'">Criar conta</a>
    </div>
  </div>
  <script src="app.js?v=20260521-backend-db"></script>
  <script>
    function toggleSenha() {
      const input = document.getElementById("senhaInput");
      input.type = input.type === "password" ? "text" : "password";
    }

    document.getElementById("forgotLink").addEventListener("click", function () {
      GE.mensagem("Procure um administrador para redefinir sua senha.", "info");
    });

    function textoSeguro(texto) {
      return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    document.getElementById("mostrarCodigos").addEventListener("click", function () {
      const painel = document.getElementById("painelCodigos");
      const empresas = GE.empresas();

      if (!empresas.length) {
        GE.mensagem("Nenhuma empresa foi criada neste navegador ainda.", "info");
        return;
      }

      painel.innerHTML = empresas.map((empresa) => `
        <div class="company-code-item">
          <span class="company-code-name">${textoSeguro(empresa.nome)}</span>
          <button class="company-code-value" type="button" onclick="selecionarCodigoEmpresa('${textoSeguro(empresa.codigo || empresa.id)}')">${textoSeguro(empresa.codigo || empresa.id)}</button>
        </div>
      `).join("");
      painel.classList.toggle("open");
    });

    function selecionarCodigoEmpresa(codigo) {
      document.querySelectorAll(".form-input")[0].value = codigo;
      document.getElementById("painelCodigos").classList.remove("open");
      GE.mensagem(`Código ${codigo} preenchido.`, "success");
    }

    document.querySelector(".btn.btn-primary").addEventListener("click", function () {
      const campos = document.querySelectorAll(".form-input");
      const codigoEmpresa = campos[0].value.trim();
      const email = campos[1].value.trim();
      const senha = campos[2].value;

      if (!codigoEmpresa || !email || !senha) {
        GE.mensagem("Informe o código da empresa, e-mail e senha.", "warning");
        return;
      }

      const usuario = GE.autenticar(email, senha, codigoEmpresa);

      if (!usuario) {
        GE.mensagem("Código da empresa, e-mail ou senha incorretos.", "error");
        return;
      }

      if (usuario.erro) {
        GE.mensagem(usuario.erro, "warning");
        return;
      }

      GE.mensagem(`Login realizado com sucesso em ${usuario.empresaNome}!`, "success", { tempo: 1200 });
      setTimeout(() => window.location.href = "03-dashboard.html", 650);
    });
  </script>
</body>

</html>
