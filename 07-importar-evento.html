<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title">Importar Evento</div>
      <div class="page-subtitle">Integre com o sistema de eventos</div>
    </div>
  </div>

  <div style="max-width:600px">
    <div class="card">
      <div class="form-group">
        <label class="form-label">Arquivo JSON</label>
        <div class="upload-area">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="36" height="36" style="color:var(--text3);margin-bottom:12px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div style="color:var(--text3);font-size:13px;margin-bottom:12px">Arraste um arquivo JSON ou clique para selecionar</div>
          <button class="btn btn-secondary" id="escolherJson">Escolher Arquivo JSON</button>
        </div>
      </div>

      <div>
        <div style="font-size:12.5px;color:var(--text3);margin-bottom:8px">Ou cole os dados:</div>
        <textarea class="json-preview" id="jsonEvento" style="width:100%;min-height:160px;resize:vertical">
<span class="json-key">"evento_id"</span>: <span class="json-str">"EVT123"</span>,<br>
<span class="json-key">"nome"</span>: <span class="json-str">"Show de Verão 2024"</span>,<br>
<span class="json-key">"data"</span>: <span class="json-str">"28/01/2024"</span>,<br>
<span class="json-key">"equipamentos"</span>: [<span class="json-str">"EQP001"</span>, <span class="json-str">"EQP002"</span>, <span class="json-str">"EQP005"</span>]
        </textarea>
      </div>

      <div style="display:flex;justify-content:flex-end;margin-top:24px">
        <button class="btn btn-primary" id="importarEvento">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Importar e Dar Baixa
        </button>
      </div>
    </div>
  </div>
</main>
<script src="app.js?v=20260521-backend-db"></script>
<script>
const escolher = document.getElementById("escolherJson");
const importar = document.getElementById("importarEvento");
const jsonEvento = document.getElementById("jsonEvento");

jsonEvento.value = `{ "evento_id": "EVT123", "nome": "Show de Ver?o 2024", "data": "2024-01-28", "local": "Arena Anhembi", "equipamentos": ["EQP001", "EQP002", "EQP005"] }`;

escolher.addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.addEventListener("change", () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => jsonEvento.value = reader.result;
    reader.readAsText(file);
  });
  input.click();
});

importar.addEventListener("click", () => {
  try {
    const parsed = JSON.parse(jsonEvento.value);
    GE.salvarEvento({
      id: parsed.evento_id || parsed.id,
      nome: parsed.nome,
      data: parsed.data,
      local: parsed.local || "Local nao informado",
      equipamentos: parsed.equipamentos || []
    });
    GE.mensagem("Evento importado e equipamentos baixados para evento.", "success", { tempo: 1200 });
    setTimeout(() => window.location.href = "08-eventos.html", 650);
  } catch (error) {
    GE.mensagem("JSON inválido. Corrija os dados e tente novamente.", "error");
  }
});
</script>
</body>
</html>
